# Local test: MediaMTX on localhost (10 min runs, etc.)
site_id: test-site
sample_interval_sec: 60
jpeg_quality: 2
spool_dir: ./spool
bucket: orionalerts
key_prefix: raw
rtsp_transport: tcp
ffmpeg_timeout_sec: 15

# Uncomment to test scheduling (MediaMTX can run 24/7; capture only in window):
# active_hours: "05:00-20:00"
# active_hours_timezone: Asia/Kolkata

cameras:
  - id: cam1
    name: cam1
    rtsp_url: rtsp://localhost:8554/cam1
